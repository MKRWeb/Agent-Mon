<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>Monad Agent Hub</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  
  <div id="monad-splash-screen">
    <div class="splash-corners">
      <div class="corner top-left">MONAD-01 ◆ LOCKED</div>
      <div class="corner top-right">X 0904<br>Y 1000</div>
      <div class="corner bottom-left">MONAD / AGENT · v1.0</div>
      <div class="corner bottom-right synced">SYNCED</div>
    </div>
    
    <div class="splash-content">
      <div class="splash-subtitle">MONAD × PARALLEL EVM</div>
      
      <div class="splash-logo-container">
        <img src="logo.png" class="big-monad-logo" alt="Monad Logo" />
      </div>
      
      <h1 class="splash-title">AGENT HUB</h1>
      <div class="splash-powered">POWERED BY 10,000 TPS</div>
      
      <button id="initiate-btn">[ INITIATE SEQUENCE ]</button>
    </div>
  </div>

  <div id="monad-chat-window" class="hidden-chat">
    <div id="monad-title-bar">
      <div class="app-header-left">
        <div class="bot-avatar">
          <img src="logo.png" alt="Monad Logo" />
        </div>
        <span class="glitch-title">Monad Agent Hub</span>
      </div>
      <div class="app-header-right">
        <span id="clear-chat-btn" title="Clear Terminal">🧹</span>
      </div>
    </div>
    
    <div id="monad-chat-box">
      <div class="monad-msg-row" id="default-greeting">
        <span class="monad-bot-bubble" id="greeting-bubble"></span>
      </div>
    </div>
    
    <div id="monad-input-footer">
      <input id="monad-input-text" placeholder="Execute command or ask about Monad..." type="text" autocomplete="off" />
      <button id="monad-send-btn">&#10148;</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
